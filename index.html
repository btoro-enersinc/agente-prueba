<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Estratégico</title>

    <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 50px;
            background-color: #f4f6f9;
            color: #333;
        }
        
        .contenedor-bienvenida {
            max-width: 700px;
            margin-top: 60px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.3rem;
            color: #111;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.15rem;
            color: #555;
            line-height: 1.6;
            margin: 0;
        }

        /* FUERZA EL ANCHO DEL CHAT Y LO SEPARA DE LA BURBUJA */
        chat-messenger {
            /* Cambia el ancho definitivo (puedes subirlo a 550px si quieres más ancho) */
            width: 500px !important; 
            height: 650px !important;
            
            /* Separa la ventana un poco a la izquierda para que no tape la X o la burbuja */
            right: 25px !important; 
            bottom: 95px !important;
        }
    </style>
</head>
<body>

    <div class="contenedor-bienvenida">
        <h1>AGENTE ESTRATÉGICO</h1>
        <p>Para interactuar accede a la burbuja del chat. Un equipo de asistentes virtuales está listo para ayudarte.</p>
    </div>

    <script>
        window.addEventListener("chat-messenger-loaded", () => {
          chatSdk.registerContext(
            chatSdk.prebuilts.ces.createContext({
              deploymentName: "projects/86171080709/locations/us/apps/0960cf45-c1b8-4f43-b639-7c794e61c68b/deployments/dedd082e-1b2e-4984-b1a1-495a48598ba0",
              tokenBroker: {
                enableTokenBroker: true,
                enableRecaptcha: false
              }
            }),
          );
        });
    </script>

    <chat-messenger
      url-allowlist="*"
      color-scheme="dark"
      chat-title="AGENTE ESTRATEGICO"
      chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
    >
    </chat-messenger>

</body>
</html>
