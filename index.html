<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Estratégico</title>

    <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            /* Dejamos un espacio a la derecha para que la tarjeta no choque con el chat */
            padding: 50px 480px 50px 50px; 
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            align-items: center;
            min-height: 80vh;
            box-sizing: border-box;
        }
        
        .contenedor-bienvenida {
            max-width: 550px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #111;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        /* =======================================================
           SOLUCIÓN PARA LA BURBUJA Y EL CHAT GENERAL
        ======================================================= */
        chat-messenger {
            position: fixed !important;
            right: 30px !important;
            bottom: 40px !important; /* Subimos el componente completo para que la burbuja no se corte abajo */
            z-index: 9999;
            
            /* Configuramos las variables CSS nativas que acepta el componente de Google */
            --df-messenger-chat-window-height: 600px;
            --df-messenger-chat-window-width: 420px;
        }

        /* Responsivo básico si subes mucho el zoom */
        @media (max-width: 1100px) {
            body {
                padding: 40px;
                align-items: flex-start;
                flex-direction: column;
            }
            .contenedor-bienvenida {
                max-width: 100%;
                margin-bottom: 40px;
            }
            chat-messenger {
                /* Si la pantalla es muy chica, le permitimos usar menos ancho */
                --df-messenger-chat-window-width: 85vw;
                right: 20px !important;
                bottom: 20px !important;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor-bienvenida">
        <h1>AGENTE ESTRATÉGICO</h1>
        <p>Para interactuar accede a la burbuja del chat. Un equipo de asistentes virtuales está listo para ayudarte.</p>
    </div>

    <script>
        window.addEventListener("chat-messenger-loaded", () => {
          chatSdk.registerContext(
            chatSdk.prebuilts.ces.createContext({
              deploymentName: "projects/86171080709/locations/us/apps/0960cf45-c1b8-4f43-b639-7c794e61c68b/deployments/dedd082e-1b2e-4984-b1a1-495a48598ba0",
              tokenBroker: {
                enableTokenBroker: true,
                enableRecaptcha: false
              }
            }),
          );

          // Ajustes internos dentro del Shadow DOM
          const infoChat = document.querySelector('chat-messenger');
          if (infoChat && infoChat.shadowRoot) {
              const style = document.createElement('style');
              style.textContent = `
                  /* Centra la ventana del chat perfectamente alineada con la burbuja */
                  .df-messenger-wrapper {
                      right: 0px !important; 
                      bottom: 75px !important; /* Despega la ventana abierta por encima del botón de la X */
                  }
                  
                  df-messenger-chat {
                      height: 100% !important;
                      max-height: 100% !important;
                      overflow-y: auto !important;
                  }
              `;
              infoChat.shadowRoot.appendChild(style);
          }
        });
    </script>

    <chat-messenger
      url-allowlist="*"
      color-scheme="dark"
      chat-title="AGENTE ESTRATEGICO"
      chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
    >
    </chat-messenger>

</body>
</html>
