<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Estratégico</title>

    <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 50px;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            align-items: center;
            min-height: 80vh;
        }
        
        .contenedor-bienvenida {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #111;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        /* FUERZA LA UBICACIÓN GENERAL DE LA BURBUJA Y LA VENTANA */
        chat-messenger {
            position: fixed !important;
            right: 30px !important;
            bottom: 30px !important;
        }
    </style>
</head>
<body>

    <div class="contenedor-bienvenida">
        <h1>AGENTE ESTRATÉGICO</h1>
        <p>Para interactuar accede a la burbuja del chat. Un equipo de asistentes virtuales está listo para ayudarte.</p>
    </div>

    <script>
        window.addEventListener("chat-messenger-loaded", () => {
          // 1. Registro del contexto original de Dialogflow
          chatSdk.registerContext(
            chatSdk.prebuilts.ces.createContext({
              deploymentName: "projects/86171080709/locations/us/apps/0960cf45-c1b8-4f43-b639-7c794e61c68b/deployments/dedd082e-1b2e-4984-b1a1-495a48598ba0",
              tokenBroker: {
                enableTokenBroker: true,
                enableRecaptcha: false
              }
            }),
          );

          // 2. CÓDIGO MAESTRO: Forzar que la ventana sea gorda y se mueva al lado de la burbuja
          const infoChat = document.querySelector('chat-messenger');
          if (infoChat && infoChat.shadowRoot) {
              const style = document.createElement('style');
              style.textContent = `
                  /* Hace la ventana del chat mucho más ancha y alta */
                  .df-messenger-wrapper {
                      width: 550px !important; 
                      height: 700px !important;
                      max-height: 85vh !important;
                      
                      /* Desplaza la ventana a la izquierda para dejar la burbuja libre abajo a la derecha */
                      right: 80px !important; 
                      bottom: 20px !important;
                  }
              `;
              infoChat.shadowRoot.appendChild(style);
          }
        });
    </script>

    <chat-messenger
      url-allowlist="*"
      color-scheme="dark"
      chat-title="AGENTE ESTRATEGICO"
      chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
    >
    </chat-messenger>

</body>
</html>
